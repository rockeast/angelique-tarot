<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Angelique Tarotへのお問い合わせページ。サービス、Premium、鑑定履歴、決済などに関する質問を受け付けています。">
    <link rel="canonical" href="https://angelique-tarot.com/contact.html">
    <title>お問い合わせ - Angelique Tarot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            overflow-y: auto;
            background: #0c0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .contact-container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            width: 90%;
            margin: 60px auto;
            padding: 50px;
            background: rgba(15, 10, 30, 0.85);
            border: 1px solid rgba(212, 168, 83, 0.4);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 40px rgba(212, 168, 83, 0.05);
            text-align: center;
        }
        .contact-header { margin-bottom: 40px; }
        .contact-title {
            font-family: var(--font-heading);
            color: var(--gold-light);
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(212, 168, 83, 0.5);
        }
        .contact-desc {
            color: var(--lavender);
            font-size: 0.95rem;
            line-height: 1.8;
            opacity: 0.9;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--gold-light);
            margin-bottom: 10px;
            letter-spacing: 0.1em;
            font-family: var(--font-heading);
        }
        .input-group input,
        .input-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 168, 83, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(212, 168, 83, 0.05);
            box-shadow: 0 0 15px rgba(212, 168, 83, 0.1);
        }
        .submit-btn {
            background: linear-gradient(135deg, #7b5ea7, #d4a853);
            border: none;
            color: #fff;
            padding: 16px;
            border-radius: 50px;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 15px;
            box-shadow: 0 5px 20px rgba(123, 94, 167, 0.3);
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 168, 83, 0.4);
            filter: brightness(1.1);
        }
        .success-message {
            display: none;
            padding: 40px 0;
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: floating 3s ease-in-out infinite;
        }
        .success-title {
            font-family: var(--font-heading);
            color: var(--gold-light);
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--gold-light);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: 0.3s;
        }
        .back-link:hover { opacity: 1; text-shadow: 0 0 10px rgba(212, 168, 83, 0.5); }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="テスト動画.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <div class="contact-container">
        <div id="form-content">
            <div class="contact-header">
                <h1 class="contact-title">Contact</h1>
                <p class="contact-desc">Angelique Tarot に関するご質問、ご要望などはこちらから。天の導きが必要な際はいつでもお声がけください。</p>
            </div>
            
            <form class="contact-form" id="contact-form">
                <div class="input-group">
                    <label>YOUR NAME</label>
                    <input type="text" id="name" required placeholder="お名前">
                </div>
                <div class="input-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" id="email" required placeholder="メールアドレス">
                </div>
                <div class="input-group">
                    <label>MESSAGE</label>
                    <textarea id="message" required placeholder="天使へのメッセージをご記入ください"></textarea>
                </div>
                <button type="submit" class="submit-btn">神託を受け取る準備を整える</button>
            </form>
        </div>

        <div class="success-message" id="success-message">
            <div class="success-icon">🕊️</div>
            <h2 class="success-title">Message Sent</h2>
            <p class="contact-desc">あなたのメッセージは天使たちのもとへ届けられました。<br>大切に拝見させていただきます。</p>
        </div>

        <a href="/" class="back-link">✦ Angelique Tarot トップページへ戻る ✦</a>
    </div>

    <script>
        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.currentTarget;
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '送信中...';

            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        message: document.getElementById('message').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '送信に失敗しました。');

                document.getElementById('form-content').style.display = 'none';
                document.getElementById('success-message').style.display = 'block';
            } catch (error) {
                alert(error.message || '送信に失敗しました。');
                submitBtn.disabled = false;
                submitBtn.textContent = '神託を受け取る準備を整える';
            }
        });
    </script>
</body>
</html>
